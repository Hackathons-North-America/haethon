name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          # pnpm 11.12.0+ currently crashes in action-setup's self-update path.
          # Keep this exact until https://github.com/pnpm/pnpm/issues/12959 lands.
          version: 11.10.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Build production bundle
        run: pnpm build
        env:
          # Build-only placeholders: CI never connects to this database or Clerk app.
          # Vercel supplies and validates the real production values during deployment.
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          CRON_SECRET: ci-placeholder-not-a-production-secret

  deploy:
    name: Deploy production
    if: github.event_name == 'push'
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          # Keep deployment on the same known-good pnpm release as CI.
          version: 11.10.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Production variables are sensitive in Vercel, so `vercel pull` cannot
      # decrypt them for a local `vercel build` on the GitHub runner. Let
      # Vercel build remotely, where those variables are available securely.
      - name: Build and deploy on Vercel
        id: deploy
        run: |
          deployment_url="$(pnpm dlx vercel@55.0.0 deploy --yes --prod --token="$VERCEL_TOKEN")"
          echo "url=${deployment_url}" >> "$GITHUB_OUTPUT"
